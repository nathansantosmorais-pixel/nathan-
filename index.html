<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo da Memória - Emojis</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1e1e2f;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    h1 {
      margin-bottom: 10px;
    }
    .info {
      margin: 15px 0;
      font-size: 1.2em;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 80px);
      gap: 12px;
      justify-content: center;
      margin: 30px auto;
      max-width: 500px;
    }
    .card {
      width: 80px;
      height: 80px;
      perspective: 1000px;
      cursor: pointer;
    }
    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      text-align: center;
      transition: transform 0.6s;
      transform-style: preserve-3d;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }
    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }
    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      backface-visibility: hidden;
    }
    .card-front {
      background: #2a2a4a;
      color: white;
    }
    .card-back {
      background: #ff6b6b;
      transform: rotateY(180deg);
    }
    button {
      padding: 12px 25px;
      font-size: 1.1em;
      background: #4ecdc4;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 15px;
    }
    button:hover {
      background: #45b8ac;
    }
    .win {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-size: 2em;
    }
  </style>
</head>
<body>
  <h1>🧠 Jogo da Memória</h1>
  <div class="info">
    Movimentos: <span id="moves">0</span> | 
    Tempo: <span id="time">0</span>s
  </div>

  <div class="grid" id="grid"></div>

  <button onclick="restartGame()">Novo Jogo</button>

  <div class="win" id="winScreen">
    <h2>🎉 Parabéns! Você venceu! 🎉</h2>
    <p>Movimentos: <span id="finalMoves"></span></p>
    <p>Tempo: <span id="finalTime"></span>s</p>
    <button onclick="restartGame()">Jogar Novamente</button>
  </div>

  <script>
    const emojis = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯'];
    
    let cards = [];
    let flippedCards = [];
    let matchedPairs = 0;
    let moves = 0;
    let seconds = 0;
    let timer;

    function createCards() {
      cards = [...emojis, ...emojis]; // 20 cartas (10 pares)
      cards.sort(() => Math.random() - 0.5); // Embaralha
    }

    function startTimer() {
      if (timer) clearInterval(timer);
      seconds = 0;
      timer = setInterval(() => {
        seconds++;
        document.getElementById('time').textContent = seconds;
      }, 1000);
    }

    function createBoard() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      
      createCards();

      cards.forEach((emoji, index) => {
        const card = document.createElement('div');
        card.classList.add('card');
        card.dataset.index = index;
        card.innerHTML = `
          <div class="card-inner">
            <div class="card-front">❓</div>
            <div class="card-back">${emoji}</div>
          </div>
        `;
        card.addEventListener('click', flipCard);
        grid.appendChild(card);
      });
    }

    function flipCard() {
      if (flippedCards.length === 2) return;
      if (this.classList.contains('flipped')) return;

      this.classList.add('flipped');
      flippedCards.push(this);

      if (flippedCards.length === 2) {
        moves++;
        document.getElementById('moves').textContent = moves;
        
        const [card1, card2] = flippedCards;
        const emoji1 = card1.querySelector('.card-back').textContent;
        const emoji2 = card2.querySelector('.card-back').textContent;

        if (emoji1 === emoji2) {
          matchedPairs++;
          flippedCards = [];

          if (matchedPairs === 10) {
            setTimeout(winGame, 500);
          }
        } else {
          setTimeout(() => {
            card1.classList.remove('flipped');
            card2.classList.remove('flipped');
            flippedCards = [];
          }, 1000);
        }
      }
    }

    function winGame() {
      clearInterval(timer);
      document.getElementById('finalMoves').textContent = moves;
      document.getElementById('finalTime').textContent = seconds;
      document.getElementById('winScreen').style.display = 'flex';
    }

    function restartGame() {
      matchedPairs = 0;
      moves = 0;
      flippedCards = [];
      document.getElementById('moves').textContent = '0';
      document.getElementById('winScreen').style.display = 'none';
      createBoard();
      startTimer();
    }

    // Iniciar o jogo
    window.onload = () => {
      createBoard();
      startTimer();
    };
  </script>
</body>
</html>
